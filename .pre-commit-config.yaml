repos:
  - repo: local
    hooks:
      - id: ruff-lint
        name: ruff lint
        entry: ruff check
        language: system
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        entry: ruff format --check
        language: system
        types_or: [python, pyi]

      - id: detect-secrets
        name: detect secrets
        entry: detect-secrets-hook --baseline .secrets.baseline
        language: system
        exclude: ^(allure-results|allure-report)/
        types: [text]
